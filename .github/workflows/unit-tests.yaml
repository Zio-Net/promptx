name: Unit Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore tests/Zionet.Prompting.Tests

      - name: Build
        run: dotnet build tests/Zionet.Prompting.Tests --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/Zionet.Prompting.Tests --configuration Release --no-build --verbosity normal
