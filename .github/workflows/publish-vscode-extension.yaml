name: Publish VS Code Extension

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Extension version (e.g. 0.4.0). Leave empty to use version from package.json."
        required: false

defaults:
  run:
    working-directory: vscode-extension/promptx-vscode

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: vscode-extension/promptx-vscode/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Override version (if provided)
        if: ${{ github.event.inputs.version != '' }}
        run: npm version ${{ github.event.inputs.version }} --no-git-tag-version

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package extension
        run: vsce package

      - name: Publish to VS Code Marketplace
        run: vsce publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
