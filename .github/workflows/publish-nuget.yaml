name: Publish NuGet Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version (e.g. 1.0.0 or 1.0.0-beta.1). Leave empty to use version from .csproj."
        required: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
              echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
              VERSION=$(grep -oP '(?<=<Version>)[^<]+' src/Zionet.Shared.Prompting/Zionet.Shared.Prompting.csproj)
              echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          fi
          echo "Using version: $(grep version $GITHUB_OUTPUT | cut -d= -f2)"

      - name: Restore
        run: dotnet restore src/Zionet.Shared.Prompting

      - name: Build
        run: dotnet build src/Zionet.Shared.Prompting --configuration Release --no-restore -p:Version=${{ steps.version.outputs.version }}

      - name: Pack
        run: dotnet pack src/Zionet.Shared.Prompting --configuration Release --no-build --output nupkg -p:Version=${{ steps.version.outputs.version }}

      - name: Publish to GitHub Packages
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
              --source "https://nuget.pkg.github.com/Zio-Net/index.json" \
              --skip-duplicate \
              --api-key ${{ secrets.GITHUB_TOKEN }}
